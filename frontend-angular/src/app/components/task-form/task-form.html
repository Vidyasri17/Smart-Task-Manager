<div class="task-form-container">
  <h3>Create New Task</h3>
  <form (ngSubmit)="onSubmit()" class="task-form">
    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" [(ngModel)]="title" required placeholder="Task title...">
    </div>
    
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" [(ngModel)]="description" placeholder="Task description..."></textarea>
    </div>
    
    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" name="status" [(ngModel)]="status">
        <option value="TODO">To Do</option>
        <option value="IN_PROGRESS">In Progress</option>
        <option value="DONE">Done</option>
      </select>
    </div>
    
    <button type="submit" [disabled]="!title.trim()" class="submit-btn" id="create-task-btn">Create Task</button>
  </form>
</div>
